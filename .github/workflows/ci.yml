name: CI

on:
  pull_request:
    branches: [uat, master]
  push:
    branches: [uat, master]

# Cancel in-flight runs on the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playtest:
    name: Python playtest harness
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: eldritchmush/requirements.txt

      - name: Install Python deps
        run: pip install -r eldritchmush/requirements.txt

      - name: Run migrations on a fresh DB
        working-directory: eldritchmush
        run: evennia migrate --no-input

      - name: Initial Evennia setup (superuser + Limbo)
        # `evennia migrate` creates the Django schema but does NOT create
        # Account #1 / Limbo (#2) — those are normally made by Evennia's
        # at_initial_setup the first time the server boots. Without #2
        # our get_or_create_room falls back to a missing DEFAULT_HOME
        # and dies. Steps:
        #   1. Pre-create AccountDB(id=1) — create_objects() requires
        #      a superuser to anchor Limbo's permissions to.
        #   2. Call create_objects() to make Limbo.
        # We skip create_channels (not exposed in every Evennia release;
        # populate doesn't need channels) and reset_server (needs a
        # portal we don't have in CI).
        working-directory: eldritchmush
        env:
          DJANGO_SETTINGS_MODULE: server.conf.settings
        run: |
          python -u -c "
          import django
          django.setup()
          from evennia.accounts.models import AccountDB
          from django.contrib.auth.hashers import make_password
          if not AccountDB.objects.filter(id=1).exists():
              acct = AccountDB(id=1, username='ci_admin', email='ci@eldritchmush.test', is_superuser=True, is_staff=True)
              acct.password = make_password('ci-throwaway-password')
              acct.save()
              print('[ci] Created AccountDB(id=1) ci_admin')
          from evennia.server.initial_setup import create_objects
          create_objects()
          print('[ci] Limbo bootstrapped')
          "

      - name: Seed world (idempotent)
        working-directory: eldritchmush
        env:
          DJANGO_SETTINGS_MODULE: server.conf.settings
        run: |
          python -u -c "
          import django
          django.setup()
          exec(open('world/populate_mistvale.py').read())
          "

      - name: Run playtest scenarios
        working-directory: eldritchmush
        run: |
          evennia shell --command "
          import sys
          sys.path.insert(0, '../.claude/skills/playtest')
          from playtest import Harness, SCENARIOS
          h = Harness()
          try:
              failed = []
              for name in SCENARIOS.keys():
                  print(f'\n>>> {name}')
                  ok = h.run_scenario(name)
                  if not ok:
                      failed.append(name)
              if failed:
                  raise SystemExit(f'FAILED: {failed}')
          finally:
              h.teardown()
          "

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: evennia-logs
          path: eldritchmush/server/logs/
          retention-days: 7

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
