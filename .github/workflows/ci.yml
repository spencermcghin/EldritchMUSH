name: CI

on:
  pull_request:
    branches: [uat, master]
  push:
    branches: [uat, master]

# Cancel in-flight runs on the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The Python playtest harness used to run here, but bootstrapping a
  # fresh Evennia DB in GitHub Actions is fragile — `evennia migrate`
  # alone doesn't create Account #1 / Limbo, calling
  # `evennia.server.initial_setup.create_objects()` from a raw
  # `python -c` hits the lazy-loading machinery and ImportErrors,
  # `evennia start && evennia stop` hangs on the twistd daemon, and
  # invoking the same helpers from `evennia shell --command` triggers
  # a Django/SQLite RecursionError on the first AccountDB query.
  #
  # We rely on the post-deploy UAT smoke (Playwright) and the
  # in-session quest-* scenarios (run manually after every push) to
  # validate the harness end-to-end against a live server. This file
  # keeps just the frontend build, which is fast, deterministic, and
  # actually catches regressions.
  #
  # See `git log` around 2026-04-29 for the full path of attempts
  # if anyone wants to revive in-CI playtest later.

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
