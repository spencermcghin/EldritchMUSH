name: CI

on:
  pull_request:
    branches: [uat, master]
  push:
    branches: [uat, master]

# Cancel in-flight runs on the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playtest:
    name: Python playtest harness
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: eldritchmush/requirements.txt

      - name: Install Python deps
        run: pip install -r eldritchmush/requirements.txt

      - name: Run migrations on a fresh DB
        working-directory: eldritchmush
        run: evennia migrate --no-input

      - name: Initial Evennia setup (boot + stop)
        # `evennia migrate` creates the Django schema but does NOT create
        # Account #1 / Limbo (#2) — those are normally made by Evennia's
        # at_initial_setup the first time the server boots. Calling
        # initial_setup.create_objects() directly hits Evennia's lazy-
        # loading machinery (DefaultAccount imports return None until
        # the launcher has fully booted), so the cleanest path is just
        # to start the server briefly and stop it. The first-start hook
        # creates the superuser + Limbo + channels, then we shut down.
        working-directory: eldritchmush
        env:
          DJANGO_SETTINGS_MODULE: server.conf.settings
          ADMIN_USERNAME: ci_admin
          ADMIN_PASSWORD: ci-throwaway-password-12chars
          ADMIN_EMAIL: ci@eldritchmush.test
        run: |
          # Boot the server (initial setup fires automatically), wait
          # for both portal+server to be running, then stop cleanly.
          evennia start
          for i in $(seq 1 30); do
            if evennia status 2>&1 | grep -q "Server: Running"; then
              echo "[ci] Evennia booted after ${i}s"
              break
            fi
            sleep 2
          done
          evennia stop
          # Verify Limbo exists.
          python -u -c "
          import django; django.setup()
          from evennia.objects.models import ObjectDB
          assert ObjectDB.objects.filter(id=2).exists(), 'Limbo (#2) was not created'
          print('[ci] Limbo verified')
          "

      - name: Seed world (idempotent)
        working-directory: eldritchmush
        env:
          DJANGO_SETTINGS_MODULE: server.conf.settings
        run: |
          python -u -c "
          import django
          django.setup()
          exec(open('world/populate_mistvale.py').read())
          "

      - name: Run playtest scenarios
        working-directory: eldritchmush
        run: |
          evennia shell --command "
          import sys
          sys.path.insert(0, '../.claude/skills/playtest')
          from playtest import Harness, SCENARIOS
          h = Harness()
          try:
              failed = []
              for name in SCENARIOS.keys():
                  print(f'\n>>> {name}')
                  ok = h.run_scenario(name)
                  if not ok:
                      failed.append(name)
              if failed:
                  raise SystemExit(f'FAILED: {failed}')
          finally:
              h.teardown()
          "

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: evennia-logs
          path: eldritchmush/server/logs/
          retention-days: 7

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
