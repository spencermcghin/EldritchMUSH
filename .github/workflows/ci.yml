name: CI

on:
  pull_request:
    branches: [uat, master]
  push:
    branches: [uat, master]

# Cancel in-flight runs on the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playtest:
    name: Python playtest harness
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: eldritchmush/requirements.txt

      - name: Install Python deps
        run: pip install -r eldritchmush/requirements.txt

      - name: Run migrations on a fresh DB
        working-directory: eldritchmush
        run: evennia migrate --no-input

      - name: Seed world (idempotent)
        working-directory: eldritchmush
        env:
          DJANGO_SETTINGS_MODULE: server.conf.settings
        run: |
          python -u -c "
          import django
          django.setup()
          exec(open('world/populate_mistvale.py').read())
          "

      - name: Run playtest scenarios
        working-directory: eldritchmush
        run: |
          evennia shell --command "
          import sys
          sys.path.insert(0, '../.claude/skills/playtest')
          from playtest import Harness, SCENARIOS
          h = Harness()
          try:
              failed = []
              for name in SCENARIOS.keys():
                  print(f'\n>>> {name}')
                  ok = h.run_scenario(name)
                  if not ok:
                      failed.append(name)
              if failed:
                  raise SystemExit(f'FAILED: {failed}')
          finally:
              h.teardown()
          "

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: evennia-logs
          path: eldritchmush/server/logs/
          retention-days: 7

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
