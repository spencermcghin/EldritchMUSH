    <style>
      /* Fallback font-face declarations when Google Fonts is unreachable.
         The CSS references these font families; monospace/serif fallbacks
         keep the layout intact until the real fonts are available. */
      @font-face { font-family: 'UnifrakturMaguntia'; src: local('UnifrakturMaguntia'), local('serif'); }
      @font-face { font-family: 'Cinzel'; src: local('Cinzel'), local('Georgia'), local('serif'); font-weight: 400 700; }
      @font-face { font-family: 'Share Tech Mono'; src: local('Share Tech Mono'), local('Courier New'), local('monospace'); }
      @font-face { font-family: 'Barlow Condensed'; src: local('Barlow Condensed'), local('Arial Narrow'), local('sans-serif'); font-weight: 300 600; }
    </style>
