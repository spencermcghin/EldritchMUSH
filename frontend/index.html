<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary title + description (used by Google search results). -->
    <title>EldritchMUSH — Cross into the Annwyn</title>
    <meta
      name="description"
      content="A browser-based dark fantasy MUSH. Cross the Mists into the Annwyn by ship, with the Cirque caravan, in a noble retinue, with the Lodge of the Metaphysical Mind, or chained in the Last Walk. Five paths into the dark — pick yours."
    />
    <meta name="theme-color" content="#0a0807" />

    <!-- Favicon — the canonical 'E' from the Eldritch Art Repository.
         256x256 PNG; browsers downscale for the tab. apple-touch-icon
         used by iOS for the home-screen icon. -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.png" />

    <!-- Open Graph (Discord / iMessage / Slack link previews). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="EldritchMUSH" />
    <meta property="og:title" content="EldritchMUSH — Cross into the Annwyn" />
    <meta
      property="og:description"
      content="A browser-based dark fantasy MUSH. Cross the Mists by ship, caravan, retinue, scholar party, or chain gang. Five paths into the dark."
    />
    <meta property="og:url" content="https://eldritchmush.com/" />
    <meta property="og:image" content="https://eldritchmush.com/art/eldritch-logo.png" />
    <meta property="og:image:alt" content="EldritchMUSH" />

    <!-- Twitter / X cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="EldritchMUSH — Cross into the Annwyn" />
    <meta
      name="twitter:description"
      content="A browser-based dark fantasy MUSH. Five paths into the dark — pick yours."
    />
    <meta name="twitter:image" content="https://eldritchmush.com/art/eldritch-logo.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <style>
      /* Fallbacks if Google Fonts is unreachable */
      @font-face { font-family: 'Cinzel'; src: local('Cinzel'), local('Georgia'), local('serif'); font-weight: 400 700; }
      @font-face { font-family: 'Cinzel Decorative'; src: local('Cinzel Decorative'), local('Georgia'), local('serif'); font-weight: 700; }
      @font-face { font-family: 'Cormorant Garamond'; src: local('Cormorant Garamond'), local('Georgia'), local('serif'); }
      @font-face { font-family: 'Share Tech Mono'; src: local('Share Tech Mono'), local('Courier New'), local('monospace'); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
